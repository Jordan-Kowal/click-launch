version: '3'

dotenv: ['.env']

includes:
  common: ./build/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml

vars:
  APP_NAME: "ClickLaunch"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "darwin:build"

  dev:build:
    summary: Builds the application for development (no production tag)
    cmds:
      - task: "darwin:build"
        vars:
          DEV: "true"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "darwin:package"

  run:
    summary: Runs the application
    cmds:
      - task: "darwin:run"

  release:local:
    summary: Builds a signed+notarized local release DMG (reads SIGN_IDENTITY + NOTARY_PROFILE from .env)
    preconditions:
      - sh: test -n "$SIGN_IDENTITY"
        msg: "SIGN_IDENTITY not set. Copy .env.example to .env."
      - sh: test -n "$NOTARY_PROFILE"
        msg: "NOTARY_PROFILE not set. Copy .env.example to .env."
    cmds:
      - task: "darwin:release"

  dev:
    summary: Runs the application in development mode (use WAILS_VITE_PORT to override, e.g. WAILS_VITE_PORT=9246 task dev)
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  generate:
    summary: Regenerates Wails TypeScript bindings from Go services
    cmds:
      - task: common:generate:bindings
        vars:
          BUILD_FLAGS: '-tags production -trimpath -buildvcs=false -ldflags="-w -s"'

  lint:
    summary: Runs all linters (biome, tsc, golangci-lint, CI pins)
    cmds:
      - bun run biome:check
      - bun run tsc
      - golangci-lint run ./backend/...
      - sh scripts/check-ci-pins.sh

  test:
    summary: Runs all tests
    env:
      CGO_LDFLAGS: "-mmacosx-version-min=10.15"
    cmds:
      - go test -race ./backend/...

  vuln:
    summary: Runs govulncheck (version pinned via go.mod tool directive)
    env:
      # golang.org/x/telemetry ships transitively with govulncheck; keep
      # the intent explicit even though upstream default is currently off.
      GOTELEMETRY: "off"
    cmds:
      - go tool govulncheck ./backend/...

  check:
    summary: Runs all quality checks (lint + test + vuln)
    cmds:
      - task: lint
      - task: test
      - task: vuln

  upgrade:
    summary: Updates all dependencies to latest versions and runs checks
    cmds:
      - bun update --latest
      - go get -u ./...
      - go mod tidy
      - task: check

  clean:
    summary: Removes build artifacts
    cmds:
      - rm -rf dist bin

  version:bump:
    summary: Bumps the app version across all config files
    cmds:
      - sh scripts/bump-version.sh {{.CLI_ARGS}}
